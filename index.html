<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파이썬 기말고사 대비 핵심 정리</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0ede8;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #888;
    --border: #e0dcd6;
    --border2: #ccc;
    --blue-bg: #e8f0fe;
    --blue-text: #1a56b0;
    --green-bg: #e6f4ea;
    --green-text: #1a6e2e;
    --amber-bg: #fef3e2;
    --amber-text: #8a4e00;
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'SFMono-Regular', Consolas, 'Courier New', monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #777;
      --border: #3a3a3c;
      --border2: #555;
      --blue-bg: #1a2c4e;
      --blue-text: #6aadff;
      --green-bg: #1a3020;
      --green-text: #5ccf7a;
      --amber-bg: #3a2a0a;
      --amber-text: #f5b840;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px; }
  .wrapper { max-width: 860px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }

  .hero { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem 1.8rem; margin-bottom: 1.5rem; }
  .hero h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.4rem; }
  .hero p { font-size: 13px; color: var(--text2); }

  .toc { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .toc-btn { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .toc-btn:hover { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; }

  .section { margin-bottom: 1.2rem; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 0.85rem 1.2rem; background: var(--bg2); cursor: pointer; user-select: none; }
  .section-header:hover { background: var(--bg3); }
  .num-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--blue-bg); color: var(--blue-text); white-space: nowrap; }
  .section-title { font-size: 15px; font-weight: 500; flex: 1; }
  .chevron { color: var(--text3); font-size: 13px; transition: transform 0.2s; display: inline-block; }
  .open-chevron { transform: rotate(180deg); }

  .section-body { padding: 1rem 1.2rem; display: none; flex-direction: column; gap: 0.9rem; background: var(--bg); }
  .section-body.open { display: flex; }

  .card { background: var(--bg2); border-radius: var(--radius-sm); padding: 0.85rem 1rem; border: 1px solid var(--border); }
  .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
  .card-label.concept { color: var(--blue-text); }
  .card-label.exam { color: var(--amber-text); }
  .card-label.code { color: var(--green-text); }

  .card p, .card ul, .card li { font-size: 14px; color: var(--text); }
  .card ul { padding-left: 1.2rem; }
  .card ul li { margin-bottom: 0.2rem; }

  pre { background: var(--bg3); border-radius: var(--radius-sm); padding: 0.8rem 1rem; overflow-x: auto; font-family: var(--mono); font-size: 13px; line-height: 1.55; border: 1px solid var(--border); color: var(--text); }

  .diff-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  @media (max-width: 560px) { .diff-row { grid-template-columns: 1fr; } }

  .sub-label { font-size: 11px; font-weight: 600; color: var(--green-text); margin-bottom: 6px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  th { background: var(--bg3); font-weight: 500; }
  td code { font-family: var(--mono); background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  .top20 { list-style: none; counter-reset: top; display: flex; flex-direction: column; gap: 0.5rem; }
  .top20 li { counter-increment: top; display: flex; align-items: flex-start; gap: 0.75rem; font-size: 14px; background: var(--bg2); border-radius: var(--radius-sm); padding: 0.65rem 0.9rem; border: 1px solid var(--border); }
  .top20 li::before { content: counter(top); font-size: 11px; font-weight: 600; min-width: 22px; height: 22px; border-radius: 50%; background: var(--blue-bg); color: var(--blue-text); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .top20 li code { font-family: var(--mono); font-size: 12px; background: var(--bg3); padding: 1px 5px; border-radius: 3px; }

  footer { text-align: center; font-size: 12px; color: var(--text3); margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); }
</style>
</head>

menu = ['아메리카노','라떼','모카']
pick = random.choice(menu)
print(pick)  # 1개 랜덤 출력</pre></div>

answer = random.randint(1, 5)

for i in range(10):
    guess = int(input("숫자를 맞혀보세요(1~5): "))
    if guess == answer:

    id:"s15", num:"TOP20", title:"🏆 시험 직전 TOP 20",
    html:`
    <ol class="top20">
      <li><code>/</code> 나눗셈 결과는 <strong>항상 실수형</strong> (<code>10/2 → 5.0</code>), <code>//</code> 몫은 정수형</li>
      <li><code>input()</code> 결과는 <strong>항상 문자열</strong> → 계산에 사용하려면 <code>int()</code> / <code>float()</code> 변환 필수</li>
      <li>f-string 형식: <code>f"{변수:.2f}"</code> (소수점 2자리), <code>f"{변수:,}"</code> (천단위 쉼표)</li>
      <li>범위 조건 두 표현: <code>80 &lt;= score &lt; 90</code> = <code>score &gt;= 80 and score &lt; 90</code></li>
      <li><code>range(시작, 끝, 단계)</code> → 끝 숫자 포함 안 됨. <code>range(1,6)</code> = 1,2,3,4,5</li>
      <li><code>break</code> = 반복문 완전 탈출, <code>continue</code> = 이번 회차만 건너뛰고 계속</li>
      <li><code>for~else</code> / <code>while~else</code> : break 없이 정상 종료할 때만 else 실행</li>
      <li>리스트 인덱스는 <strong>0부터 시작</strong>. <code>a[1:3]</code> = 인덱스 1이상 3미만</li>

];

const tocEl = document.getElementById('toc');
const secEl = document.getElementById('sections');

DATA.forEach(sec => {
  const btn = document.createElement('a');
  btn.className = 'toc-btn';
  btn.textContent = sec.num;
  btn.href = '#' + sec.id;
  btn.title = sec.title;
  tocEl.appendChild(btn);

  const wrap = document.createElement('div');
  wrap.className = 'section';
  wrap.id = sec.id;

  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = `<span class="num-badge">${sec.num}</span><span class="section-title">${sec.title}</span><span class="chevron" id="chv-${sec.id}">▼</span>`;

  const body = document.createElement('div');
  body.className = 'section-body' + (sec.id === 's15' ? ' open' : '');
  body.id = 'body-' + sec.id;
  body.innerHTML = sec.html;

  hdr.addEventListener('click', () => {
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    const chv = document.getElementById('chv-' + sec.id);
    chv.classList.toggle('open-chevron', !isOpen);
  });

  wrap.appendChild(hdr);
  wrap.appendChild(body);
  secEl.appendChild(wrap);
});

// Open first section by default
document.querySelector('.section-header').click();
</script>
